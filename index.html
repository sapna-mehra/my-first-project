<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelby Public Beta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}

/* Glow Circle */
.glow {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 100px auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  font-weight: bold;
  color: white;
  background: black;
  box-shadow: 0 0 20px #ff8c00,
              0 0 60px #ff8c00,
              0 0 120px #ff8c00;
}

/* Text */
h2 {
  margin: 10px 0;
  font-weight: normal;
}

h3 {
  letter-spacing: 3px;
  font-size: 16px;
  margin-top: 15px;
}

h1 {
  font-size: 38px;
  letter-spacing: 4px;
  margin: 10px 0 30px;
}

/* Button */
.btn {
  padding: 14px 28px;
  background: #ff1a1a;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.btn:hover {
  background: #cc0000;
}

/* Bottom Glow */
.bottom-glow {
  position: fixed;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 200px;
  background: radial-gradient(circle, #ff8c00 0%, transparent 70%);
  filter: blur(50px);
}
</style>
</head>

<body>

<div class="glow">S</div>

<h2>Shelby</h2>
<h3>PUBLIC BETA</h3>
<h1>COMING SOON!</h1>

<button class="btn" onclick="goToLink()">Register for Early Access</button>

<div class="bottom-glow"></div>

<script>
function goToLink() {
  window.location.href = "https://t.me/yourlink"; // yaha apna link daal
}
</script>

</body>
</html>
