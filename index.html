<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelby Public Beta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}

/* Glow Animation */
@keyframes glowPulse {
  0% { box-shadow: 0 0 20px #ff8c00, 0 0 60px #ff8c00; }
  50% { box-shadow: 0 0 40px #ff8c00, 0 0 100px #ff8c00; }
  100% { box-shadow: 0 0 20px #ff8c00, 0 0 60px #ff8c00; }
}

/* Circle */
.glow {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 100px auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  font-weight: bold;
  color: white;
  background: black;
  animation: glowPulse 2s infinite;
}

/* Text */
h2 {
  margin: 10px 0;
  font-weight: normal;
}

h3 {
  letter-spacing: 3px;
  font-size: 14px;
  margin-top: 10px;
  opacity: 0.8;
}

h1 {
  font-size: 38px;
  letter-spacing: 5px;
  margin: 15px 0 30px;
}

/* Button Gradient */
.btn {
  padding: 14px 30px;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  background: linear-gradient(45deg, #ff0000, #ff6600);
  box-shadow: 0 0 10px #ff3300;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff3300;
}

/* Bottom Glow */
.bottom-glow {
  position: fixed;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 450px;
  height: 220px;
  background: radial-gradient(circle, #ff8c00 0%, transparent 70%);
  filter: blur(60px);
}
</style>
</head>

<body>

<div class="glow">S</div>

<h2>Shelby</h2>
<h3>PUBLIC BETA</h3>
<h1>COMING SOON!</h1>

<button class="btn" onclick="goToLink()">Register for Early Access</button>

<div class="bottom-glow"></div>

<script>
function goToLink() {
  window.location.href = "https://t.me/yourlink";
}
</script>

</body>
</html>
